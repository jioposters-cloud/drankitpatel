                body, html {

                              padding: 0;
                              height: 100%;
                              width: 100%;
                              overflow: hidden; /* Prevents double scrollbars */
                              background-color: #ffffff;
                }

                /* 
                   This container crops the bottom of the iframe to hide the Canva footer.
                   The iframe is made slightly taller than the screen, hiding the bottom part.
                */
                .canva-embed-container {
                              position: relative;
                              width: 100%;
                              height: 100vh;
                              overflow: hidden;
                }

                .canva-embed-container iframe {
                              position: absolute;
                              top: 0;
                              left: 0;
                              width: 100%;
                              /* Make the iframe 60px taller than the screen to hide the bottom Canva watermark */
                              height: calc(100vh + 60px); 
                              border: none;
                }

                /* Responsive adjustments for mobile if the footer size changes */
                @media (max-width: 768px) {
                              .canva-embed-container iframe {
                                                height: calc(100vh + 70px);
                              }
                }
            </style>
  </head>
